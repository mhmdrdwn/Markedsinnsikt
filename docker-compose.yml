version: "3.9"

services:
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env

  dashboard:
    build: .
    command: python dashboard.py
    ports:
      - "8050:8050"
    environment:
      - API_URL=http://api:8000
    env_file:
      - .env
    depends_on:
      - api
